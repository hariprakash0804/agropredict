services:
  # Web Service for the FastAPI backend
  - type: web
    name: agropredict-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    # Path to the backend relative to repo root
    rootDir: agropredict/backend
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false # Must be provided by the user (MySQL database URI)
      - key: REDIS_URL
        fromService:
          name: agropredict-redis
          type: redis
          property: connectionString
      - key: DATA_GOV_IN_API_KEY
        sync: false # Must be provided by the user
      - key: OPENROUTER_API_KEY
        sync: false # Must be provided by the user
      - key: FRONTEND_URL
        sync: false # URL of your deployed frontend (e.g. on Vercel)
      - key: CHRONOS_MODEL_NAME
        value: amazon/chronos-t5-small
      - key: API_HOST
        value: 0.0.0.0

  # Redis instance for caching
  - type: redis
    name: agropredict-redis
    plan: free
    ipAllowList: [] # Restrict to internal connections only
